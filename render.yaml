services:
  - type: web
    name: catering-inventory-auth
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: ADMIN_RESET_TTL_MIN
        value: 30
      - key: ALLOWED_ORIGIN
        value: https://taha-farooq.github.io
      - key: ALLOWED_ORIGINS
        value: https://taha-farooq.github.io,http://localhost:5500,http://127.0.0.1:5500
      - key: ADMIN_RESET_JWT_SECRET
        generateValue: true
